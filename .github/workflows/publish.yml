name: Publish profile and Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4 @ 2026-07-16

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 @ 2025-04-02
        with:
          node-version: '22'

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v5 @ 2025-04-24
        with:
          python-version: '3.12'

      - name: Validate publishing secrets
        env:
          PAT_APP_ID: ${{ secrets.PAT_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          test -n "$PAT_APP_ID" || { echo "::error::PAT_APP_ID is not configured"; exit 1; }
          test -n "$APP_PRIVATE_KEY" || { echo "::error::APP_PRIVATE_KEY is not configured"; exit 1; }

      - name: Install generator dependencies and token helper
        run: |
          # Hash-locked so a compromised PyPI release of Jinja2/MarkupSafe cannot
          # execute on import while GH_TOKEN still holds the App installation token
          # minted below. Bumps are a deliberate, reviewed change to
          # requirements.ci.txt. See issue #5.
          python3 -m pip install --require-hashes -r requirements.ci.txt
          mkdir -p ~/.local/bin/pat_lib
          # Pin the token helper to an immutable commit (not the mutable `main`
          # branch): this code runs with APP_PRIVATE_KEY in its environment, so a
          # pinned, reviewed SHA is the only ref a compromise of `main` cannot
          # swap in. Bump PAT_REF deliberately and re-review the fetched files.
          PAT_REF="20496e67b653713e7b533458b3e7860087e88608"
          base="https://raw.githubusercontent.com/etopro/plugin-marketplace/$PAT_REF/plugins/pat"
          curl -fsSL "$base/scripts/pat.sh" -o ~/.local/bin/pat
          curl -fsSL "$base/scripts/pat_lib/jwt.sh" -o ~/.local/bin/pat_lib/jwt.sh
          curl -fsSL "$base/scripts/pat_lib/bw.sh" -o ~/.local/bin/pat_lib/bw.sh
          chmod +x ~/.local/bin/pat
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure token helper
        run: |
          mkdir -p ~/.config/pat
          printf 'PAT_APP_ID=%s\n' "${{ secrets.PAT_APP_ID }}" > ~/.config/pat/config
          chmod 600 ~/.config/pat/config

      - name: Mint installation token
        id: token
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          token="$(pat token)"
          test -n "$token" || { echo "::error::GitHub App token is empty"; exit 1; }
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Update daily star history
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: python3 profile/sync/stars_history.py

      - name: Generate profile fragments
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: python3 profile/sync/generate.py

      - name: Test and build
        run: |
          npm test
          python3 -m unittest discover -s profile/tests
          python3 profile/sync/build_pages.py

      - name: Sync README to axisrow/axisrow
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          tmp="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/axisrow/axisrow.git" "$tmp/repo"
          cp .build/profile/axisrow/README.md "$tmp/repo/README.md"
          if git -C "$tmp/repo" diff --quiet; then
            echo "README unchanged."
          else
            git -C "$tmp/repo" -c user.email="4278593+axisrow-ci[bot]@users.noreply.github.com" \
              -c user.name="axisrow-ci[bot]" commit -am \
              "bot: sync profile README (stars $(date -u +%Y-%m-%d))"
            git -C "$tmp/repo" push origin HEAD:main
          fi

      - name: Persist star history
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          if git diff --quiet -- profile/data/stars-history.json; then
            echo "Star history unchanged."
          else
            git add profile/data/stars-history.json
            git -c user.email="4278593+axisrow-ci[bot]@users.noreply.github.com" \
              -c user.name="axisrow-ci[bot]" commit -m \
              "bot: update star history ($(date -u +%Y-%m-%d)) [skip ci]"
            git push "https://x-access-token:${TOKEN}@github.com/axisrow/axisrow.github.io.git" HEAD:main
          fi

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5 @ 2024-03-30

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v3 @ 2024-02-07
        with:
          path: .pages-dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4 @ 2024-03-15
