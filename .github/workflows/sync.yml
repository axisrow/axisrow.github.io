name: sync-profile

# Single source of truth → generates README (axisrow/axisrow) + Projects fragment
# (axisrow.github.io) and cross-pushes them, using a short-lived GitHub App
# installation token minted by `pat` from the APP_PRIVATE_KEY secret.
#
# Stars are pulled live from the GitHub API on every run.

on:
  push:
    branches: [main]
    paths:
      - 'projects.json'
      - 'sync/**'
      - '.github/workflows/sync.yml'
  schedule:
    # Daily ~03:17 UTC (off-round minute to avoid the API rush).
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-profile
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile (source of truth)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "Install pat (from marketplace) + jinja2"
        run: |
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet jinja2
          # pat ships in etopro/plugin-marketplace. Vendor pat.sh + pat_lib/
          # side-by-side so pat.sh's own SCRIPT_DIR/pat_lib/ resolution works
          # unchanged (SCRIPT_DIR = dir of pat.sh).
          mkdir -p ~/.local/bin/pat_lib
          base="https://raw.githubusercontent.com/etopro/plugin-marketplace/main/plugins/pat"
          curl -fsSL "$base/scripts/pat.sh"         -o ~/.local/bin/pat
          curl -fsSL "$base/scripts/pat_lib/jwt.sh"  -o ~/.local/bin/pat_lib/jwt.sh
          curl -fsSL "$base/scripts/pat_lib/bw.sh"   -o ~/.local/bin/pat_lib/bw.sh
          chmod +x ~/.local/bin/pat
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: "Configure pat (CI mode: PEM from secret, no Bitwarden)"
        run: |
          mkdir -p ~/.config/pat
          printf 'PAT_APP_ID=%s\n' "${{ secrets.PAT_APP_ID }}" > ~/.config/pat/config
          chmod 600 ~/.config/pat/config

      - name: Mint installation token
        id: token
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          echo "token=$(pat token)" >> "$GITHUB_OUTPUT"

      - name: Restore the previous star-history snapshot
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          tmp="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/axisrow/axisrow.github.io.git" "$tmp/repo"
          if [ -f "$tmp/repo/stars-history.json" ]; then
            mkdir -p data
            cp "$tmp/repo/stars-history.json" data/stars-history.json
          fi

      - name: Restore and update daily star history
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: python3 sync/stars_history.py

      - name: Generate outputs (live stars from API)
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          python3 sync/generate.py
          echo "--- generated README ---"
          head -40 out/axisrow/README.md

      - name: Sync README → axisrow/axisrow
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          tmp="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/axisrow/axisrow.git" "$tmp/repo"
          cp out/axisrow/README.md "$tmp/repo/README.md"
          msg="bot: sync profile README (stars $(date -u +%Y-%m-%d))"
          if git -C "$tmp/repo" diff --quiet; then
            echo "README unchanged."
          else
            git -C "$tmp/repo" -c user.email="4278593+axisrow-ci[bot]@users.noreply.github.com" -c user.name="axisrow-ci[bot]" commit -am "$msg"
            git -C "$tmp/repo" push origin HEAD:main
          fi

      - name: Sync Projects fragment → axisrow.github.io
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          tmp="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/axisrow/axisrow.github.io.git" "$tmp/repo"
          python3 sync/apply_site_fragments.py "$tmp/repo/index.html" \
            --projects out/site/projects.html \
            --stars out/site/stars.html \
            --stats out/site/stats.json
          cp data/stars-history.json "$tmp/repo/stars-history.json"
          git -C "$tmp/repo" add index.html stars-history.json
          msg="bot: sync portfolio projects and stars ($(date -u +%Y-%m-%d))"
          if git -C "$tmp/repo" diff --quiet && git -C "$tmp/repo" diff --cached --quiet; then
            echo "site unchanged."
          else
            git -C "$tmp/repo" -c user.email="4278593+axisrow-ci[bot]@users.noreply.github.com" -c user.name="axisrow-ci[bot]" commit -m "$msg"
            git -C "$tmp/repo" push origin HEAD:main
          fi
