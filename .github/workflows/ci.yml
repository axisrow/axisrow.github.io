name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4 @ 2026-07-16

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 @ 2025-04-02
        with:
          node-version: '22'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5 @ 2025-04-24
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        # Hash-locked so a compromised PyPI release of Jinja2/MarkupSafe cannot
        # execute on import. Bumps are a deliberate, reviewed change to
        # requirements.ci.txt. See issue #5.
        # --only-binary=:all: forbids sdist builds: building an sdist pulls in
        # build deps (setuptools/flit_core) that the parent hash lock does NOT
        # cover, reopening an unhashed code-execution path. See pip secure-installs.
        run: "python3 -m pip install --require-hashes --only-binary=:all: -r requirements.ci.txt"

      - name: Test site
        run: npm test

      - name: Test profile generators
        run: python3 -m unittest discover -s profile/tests

      - name: Generate profile fragments
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 profile/sync/generate.py

      - name: Build Pages artifact
        run: python3 profile/sync/build_pages.py

      - name: Verify public artifact boundary
        run: |
          test ! -e .pages-dist/profile
          test -z "$(find .pages-dist -type f \( -name '*.py' -o -name '*test*' -o -name '*.pem' \) -print -quit)"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4 @ 2025-03-19
        with:
          name: pages-preview
          path: .pages-dist
          include-hidden-files: true
          if-no-files-found: error
