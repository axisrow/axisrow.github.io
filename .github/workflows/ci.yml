name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python3 -m pip install --quiet jinja2

      - name: Test site
        run: npm test

      - name: Test profile generators
        run: python3 -m unittest discover -s profile/tests

      - name: Generate profile fragments
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 profile/sync/generate.py

      - name: Build Pages artifact
        run: python3 profile/sync/build_pages.py

      - name: Verify public artifact boundary
        run: |
          test ! -e .pages-dist/profile
          test -z "$(find .pages-dist -type f \( -name '*.py' -o -name '*test*' -o -name '*.pem' \) -print -quit)"

      - uses: actions/upload-artifact@v4
        with:
          name: pages-preview
          path: .pages-dist
          include-hidden-files: true
          if-no-files-found: error
